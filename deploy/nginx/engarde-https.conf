map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 175.27.164.69 _;

    client_max_body_size 128m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /video/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /chat {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /ready {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /docs {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /redoc {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name linlay.store www.linlay.store;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name linlay.store www.linlay.store _;

    ssl_certificate /etc/nginx/ssl/linlay.store_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/linlay.store.key;
    ssl_trusted_certificate /etc/nginx/ssl/linlay.store_bundle.crt;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 128m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /video/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /chat {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /ready {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /docs {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /redoc {
        proxy_pass http://127.0.0.1:8000;
    }

    location = /openapi.json {
        proxy_pass http://127.0.0.1:8000;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
